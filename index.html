<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <title>Check-In</title>
    <link rel="icon" type="image/svg+xml" href="/icon.svg">
    <link rel="stylesheet" href="/src/style.css">
</head>
<body>
    <div class="header">
        <h1>Check-In</h1>
        <div class="date" id="currentDate"></div>
    </div>

<div class="activity-section">
    <h2 class="group-header">Timeline</h2>
    <div class="activities">
        <button class="activity-btn" onclick="quickCheckIn('🛏️ Woke Up')">🛏️ Woke Up</button>
        <button class="activity-btn" onclick="quickCheckIn('🧘 Did meditation')">🧘 Did meditation</button>
        <button class="activity-btn" onclick="quickCheckIn('💪 Arrived at Gym')">💪 Arrived at Gym</button>
        <button class="activity-btn" onclick="quickCheckIn('💪 Left Gym')">💪 Left Gym</button>
	<button class="activity-btn" onclick="quickCheckIn('🤸 Did workout')">Did workout</button>
        <button class="activity-btn" onclick="quickCheckIn('🍳 Had Breakfast')">🍳 Had Breakfast</button>
        <button class="activity-btn" onclick="quickCheckIn('🪑 Arrived at my desk')">🪑 Arrived at my desk</button>
        <button class="activity-btn" onclick="quickCheckIn('🍽️ Had Lunch')">🍽️ Had Lunch</button>
        <button class="activity-btn" onclick="quickCheckIn('🍎 Had afternoon break')">🍎 Had afternoon break</button>
        <button class="activity-btn" onclick="quickCheckIn('💼 Left work')">💼 Left work</button>
        <button class="activity-btn" onclick="quickCheckIn('🍷 Had Dinner')">🍷 Had Dinner</button>
        <button class="activity-btn" onclick="quickCheckIn('😴 Went to Bed')">😴 Went to Bed</button>
        <button class="activity-btn" onclick="quickCheckIn('☕ Had a coffee')">☕ Had a coffee</button>
    </div>
</div>

<div class="activity-section">
    <h2 class="group-header">Feeling</h2>
    <div class="activities">
        <button class="activity-btn" onclick="feelingCheckIn('😊 Happy')">😊 Happy</button>
        <button class="activity-btn" onclick="feelingCheckIn('😢 Sad')">😢 Sad</button>
        <button class="activity-btn" onclick="feelingCheckIn('😠 Frustrated')">😠 Frustrated</button>
        <button class="activity-btn" onclick="feelingCheckIn('😰 Anxious')">😰 Anxious</button>
        <button class="activity-btn" onclick="feelingCheckIn('🤩 Excited')">🤩 Excited</button>
    </div>
</div>

<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <h3 id="modalTitle">How are you feeling?</h3>
        <input type="text" id="feelingReason" class="custom-input" placeholder="Optional: Why are you feeling this way?">
        <div class="modal-buttons">
            <button class="modal-btn cancel" onclick="closeModal()">Skip</button>
            <button class="modal-btn confirm" onclick="submitFeeling()">Save</button>
        </div>
    </div>
</div>

<div class="custom-checkin">
    <input type="text" class="custom-input" id="customActivity" placeholder="Or type your own activity...">
    <button class="custom-btn" onclick="customCheckIn()">Check In</button>
</div>

<div class="history">
    <div class="history-header">
        <h2>Last 30 Days</h2>
        <button class="clear-btn" onclick="clearHistory()">Clear All</button>
    </div>
    <div id="historyList"></div>
</div>

  <div class="toast" id="toast"></div>

  <div class="update-notification" id="updateNotification">
    <div class="update-content">
      <span class="update-message">New version available!</span>
      <button class="update-btn" id="updateBtn">Reload</button>
      <button class="update-dismiss" id="dismissBtn">×</button>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
